{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" href="{% static 'MeuApp/css/login.css' %}">
</head>
<body>

<div class="login-wrapper">
    <div class="login-box">

        <h1>Login</h1>
        <p class="subtitle">Acesse sua conta</p>

        <form method="POST">
            {% csrf_token %}

            <div class="input-group">
                <label>Email</label>
                <input type="email" name="email" required>
            </div>

            <div class="input-group">
                <label>Senha</label>
                <input type="password" name="senha" required>
            </div>

            <button type="submit" class="login-btn">Entrar</button>
        </form>

        <div class="register-link">
            <span>Não tem conta?</span>
            <a href="{% url 'MeuApp:registro' %}" class="auth-link">Criar conta</a>
        </div>

    </div>
</div>

</body>
</html>
